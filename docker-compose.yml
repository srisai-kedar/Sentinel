services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-1
      - gateway-2
      - gateway-3
    networks:
      - sentinel

  gateway-1:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    environment:
      - SENTINEL_PORT=8080
      - SENTINEL_INSTANCE_ID=gateway-1
      - SENTINEL_USE_REDIS=true
      - SENTINEL_REDIS_URL=redis://redis:6379
      - SENTINEL_REDIS_FAILURE_MODE=closed
      - SENTINEL_ALGORITHM=token_bucket
      - SENTINEL_RATE_LIMIT=10
      - SENTINEL_REFILL_RATE=1
      - SENTINEL_ADMIN_API_KEY=${SENTINEL_ADMIN_API_KEY:-dev-admin-key}
    depends_on:
      redis:
        condition: service_started
    networks:
      - sentinel

  gateway-2:
    build:
      context: ./gateway
    environment:
      - SENTINEL_PORT=8080
      - SENTINEL_INSTANCE_ID=gateway-2
      - SENTINEL_USE_REDIS=true
      - SENTINEL_REDIS_URL=redis://redis:6379
      - SENTINEL_REDIS_FAILURE_MODE=closed
      - SENTINEL_ALGORITHM=token_bucket
      - SENTINEL_RATE_LIMIT=10
      - SENTINEL_REFILL_RATE=1
      - SENTINEL_ADMIN_API_KEY=${SENTINEL_ADMIN_API_KEY:-dev-admin-key}
    depends_on:
      redis:
        condition: service_started
    networks:
      - sentinel

  gateway-3:
    build:
      context: ./gateway
    environment:
      - SENTINEL_PORT=8080
      - SENTINEL_INSTANCE_ID=gateway-3
      - SENTINEL_USE_REDIS=true
      - SENTINEL_REDIS_URL=redis://redis:6379
      - SENTINEL_REDIS_FAILURE_MODE=closed
      - SENTINEL_ALGORITHM=token_bucket
      - SENTINEL_RATE_LIMIT=10
      - SENTINEL_REFILL_RATE=1
      - SENTINEL_ADMIN_API_KEY=${SENTINEL_ADMIN_API_KEY:-dev-admin-key}
    depends_on:
      redis:
        condition: service_started
    networks:
      - sentinel

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sentinel

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sentinel

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sentinel

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_BASE: ""
        VITE_ADMIN_KEY: ${SENTINEL_ADMIN_API_KEY:-dev-admin-key}
    ports:
      - "3000:80"
    depends_on:
      - gateway-1
    networks:
      - sentinel

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentinel}
      - POSTGRES_DB=sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - postgres
    networks:
      - sentinel

volumes:
  redis-data:
  postgres-data:

networks:
  sentinel:
    driver: bridge
